# Tabela 254 - Número de informantes e Quantidade estocada no último dia do
#              semestre, por produtos, tipo de propriedade da empresa e tipo de
#              atividade do estabelecimento
[[tabelas]]
tabela_sidra = "254"
variables = ["all"]
territories = {6 = []}
