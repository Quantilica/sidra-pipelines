[[table]]
name        = "couro_adquirido"
schema      = "analytics"
strategy    = "replace"
sql         = "couro_adquirido.sql"
description = "Pesquisa Trimestral do Couro - couro cru bovino adquirido para curtimento, por UF, procedência e referência temporal"

[[table]]
name        = "couro_terceiros_total"
schema      = "analytics"
strategy    = "replace"
sql         = "couro_terceiros_total.sql"
description = "Pesquisa Trimestral do Couro - couro cru bovino recebido de terceiros e total (adquirido + terceiros), por UF e referência temporal"

[[table]]
name        = "couro_curtido"
schema      = "analytics"
strategy    = "replace"
sql         = "couro_curtido.sql"
description = "Pesquisa Trimestral do Couro - couro inteiro curtido de bovino, por UF, método de curtimento e referência temporal"
