# Pesquisa Nacional por Amostra de Domicílios Contínua - Divulgação Mensal

# https://sidra.ibge.gov.br/pesquisa/pnadcm/tabelas

# OBJETIVO

# A PNAD Contínua visa a produzir indicadores para acompanhar as flutuações trimestrais e a evolução, a médio e longo prazos, da força de trabalho e outras informações necessárias para o estudo e desenvolvimento socioeconômico do País.

# RECOMENDAÇÕES INTERNACIONAIS

# A PNAD Contínua incorpora em sua metodologia atualizações conceituais referentes ao tema trabalho, com base nas recomendações internacionais vigentes no momento da concepção da pesquisa, nas discussões preparatórias para a 19ª Conferência Internacional de Estatísticos do Trabalho - CIET, da OIT, e finalmente nas recomendações adotadas por esta Conferência, em outubro de 2013, sobre trabalho, ocupação e subutilização da força de trabalho. Cabe destacar que, durante o desenvolvimento da pesquisa, o IBGE contou com a assistência técnica da OIT.

# PARTE DO SISTEMA INTEGRADO DE PESQUISAS DOMICILIARES DO IBGE

# A PNAD Contínua é parte do Sistema Integrado de Pesquisas Domiciliares - SIPD, que se constitui em um modelo de produção de pesquisas amostrais domiciliares no qual o planejamento, a execução, a análise e a disseminação dos resultados das diversas pesquisas são conduzidos de forma coordenada, facilitando o atendimento de novas demandas, bem como otimizando os recursos a serem utilizados. Destaca-se, entre outros aspectos, que a amostra de cada uma das pesquisas desse sistema corresponderá a uma parte ou à integralidade de uma amostra mestra, e os conceitos e os processos serão harmonizados entre elas.

# Com a implantação desse sistema o IBGE iniciou uma importante etapa de aprimoramento no seu sistema de pesquisas domiciliares, que propicia maior eficácia diante de frequentes demandas por informações sobre as condições socioeconômicas e demográficas da população do País.

# ABRANGÊNCIA GEOGRÁFICA

# A PNAD Contínua abrange todo o território nacional, com exceção das áreas classificadas como setores censitários de características especiais da Base Operacional Geográfica atualizada anualmente.

# Até o segundo trimestre de 2025, eram excluídos os setores de: aldeias indígenas, quartéis, bases militares, alojamentos, acampamentos, embarcações, barcos, navios, penitenciárias, colônias penais, presídios, cadeias, asilos, orfanatos, conventos, hospitais, agrovilas de projetos de assentamentos rurais e setores localizados em terras indígenas.

# A partir do terceiro trimestre 2025, com a utilização dos dados do Censo Demográfico 2022 e redefinição da Amostra Mestra, foram excluídos os setores classificados como: aldeias indígenas, agrupamentos quilombolas, quartéis, bases militares, alojamentos, acampamentos, embarcações, barcos, navios, penitenciárias, colônias penais, presídios, cadeias, Instituições de Longa Permanência para Idosos (ILPIs), Instituições de Acolhimento de Crianças e Adolescentes (IACAs), conventos, hospitais, além dos setores situados em terras indígenas e territórios quilombolas.

# POPULAÇÃO ALVO

# É a população constituída por todas as pessoas moradoras em domicílios particulares permanentes da área de abrangência da pesquisa.

# ESQUEMA DE ROTAÇÃO DA AMOSTRA DE DOMICÍLIOS

# A PNAD Contínua é realizada através de um painel rotacional, de forma que os domicílios selecionados para a amostra são pesquisados uma vez por trimestre, durante 5 trimestres consecutivos.

# PERIODICIDADE DE DIVULGAÇÃO DOS RESULTADOS

# A PNAD Contínua produz informações Conjunturais, Estruturais e Especiais.

# As informações Conjunturais estão separadas em dois grupos: Mensal e Trimestral.

# A divulgação Mensal fornece informações sobre a evolução da força de trabalho apenas para o Brasil, atualizados mensalmente por meio de trimestres móveis. Assim, a cada mês são divulgadas informações referentes ao último trimestre móvel. Nesta divulgação são disponibilizadas informações básicas sobre a força de trabalho no País.

# A divulgação Trimestral fornece informações completas e detalhadas sobre a força de trabalho para os níveis geográficos para os quais a pesquisa foi planejada: Brasil, Grandes Regiões, Unidades da Federação, Regiões Metropolitanas que contêm os municípios das capitais, Região Integrada de Desenvolvimento da Grande Teresina e municípios das capitais dos estados.

# O quadro a seguir mostra como são divulgadas as informações conjunturais da pesquisa ao longo dos 12 meses do ano, totalizando 12 divulgações mensais (referente aos trimestres móveis) e 4 divulgações trimestrais (referentes aos trimestres convencionais).


